services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=learn_project
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - learn-project-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: mongodb-dev
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=learn_project
    volumes:
      - mongodb-dev-data:/data/db
    networks:
      - learn-project-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-api:
    build:
      context: ./services/node-api
      dockerfile: Dockerfile.dev
    container_name: node-api-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOST=0.0.0.0
      - LOG_LEVEL=debug
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=learn_project
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB=learn_project
    volumes:
      - ./services/node-api/src:/app/src
      - ./services/node-api/package.json:/app/package.json
      - ./services/node-api/tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - learn-project-network

networks:
  learn-project-network:
    driver: bridge

volumes:
  postgres-dev-data:
    driver: local
  mongodb-dev-data:
    driver: local
